<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Головна сторінка</title>
</head>
<body>

    <h1>{{ cafe_name }}</h1>

    <p>Поточний час: {{ current_time }}</p>

    <p>Графік роботи: з 11:00 до 22:00</p>

    {% if 11 <= current_hour < 22 %}
        <h2>Статус: Відкрито ✅</h2>
    {% else %}
        <h2>Статус: Зачинено ❌</h2>
    {% endif %}

    <a href="/menu">Перейти до меню</a>

</body>
</html>
